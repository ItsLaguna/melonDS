name: Ubuntu

on:
  push:
    branches:
      - master
      - ui
      - ci/*
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions
#  MELONDS_VERSION_SUFFIX: " RC"

jobs:
  build:
    continue-on-error: true
    name: x86_64
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      name: Check out sources

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install --allow-downgrades cmake ninja-build extra-cmake-modules \
          libcurl4-gnutls-dev libpcap0.8-dev libsdl2-dev libenet-dev \
          libarchive-dev libzstd-dev libfaad-dev libfuse2 \
          libwayland-dev wayland-protocols \
          libgl1-mesa-dev libegl1-mesa-dev \
          libxkbcommon-dev libxkbcommon-x11-dev \
          libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
          libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
          libxcb-xinerama0-dev libxcb-xfixes0-dev qt6-wayland

    - name: Install Qt 6.10.2
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.2'
        host: linux
        target: desktop
        arch: linux_gcc_64
        modules: 'qtmultimedia'
        cache: true

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DMELONDS_EMBED_BUILD_INFO=ON -DCMAKE_PREFIX_PATH=$QT_ROOT_DIR

    - name: Build
      run: |
        cmake --build build
        DESTDIR=AppDir cmake --install build

    - uses: actions/upload-artifact@v4
      with:
        name: melonDS-ubuntu-x86_64
        path: AppDir/usr/bin/melonDS

    - name: Bundle libraries and plugins
      run: |
        set -e
        QT_LIB=$QT_ROOT_DIR/lib
        QT_PLUGINS=$QT_ROOT_DIR/plugins

        mkdir -p AppDir/usr/lib AppDir/usr/lib/qt6/plugins

        # Qt libraries - exactly matching manual build
        for lib in Core Gui Widgets Network Multimedia OpenGL OpenGLWidgets Svg DBus XcbQpa; do
          cp -a $QT_LIB/libQt6${lib}.so* AppDir/usr/lib/ 2>/dev/null || true
        done

        # ICU from Qt installer only - no system ICU
        cp -a $QT_LIB/libicui18n.so.73* AppDir/usr/lib/
        cp -a $QT_LIB/libicuuc.so.73*   AppDir/usr/lib/
        cp -a $QT_LIB/libicudata.so.73* AppDir/usr/lib/

        # System libs matching manual build
        cp -a /usr/lib/x86_64-linux-gnu/libSDL2-2.0.so* AppDir/usr/lib/ 2>/dev/null || true
        cp -a /usr/lib/x86_64-linux-gnu/libarchive.so*  AppDir/usr/lib/ 2>/dev/null || true
        cp -a /usr/lib/x86_64-linux-gnu/libzstd.so*     AppDir/usr/lib/ 2>/dev/null || true
        cp -a /usr/lib/x86_64-linux-gnu/libfaad.so*     AppDir/usr/lib/ 2>/dev/null || true

        # Qt plugins - matching manual build structure
        cp -a $QT_PLUGINS/platforms    AppDir/usr/lib/qt6/plugins/
        cp -a $QT_PLUGINS/imageformats AppDir/usr/lib/qt6/plugins/
        cp -a $QT_PLUGINS/multimedia   AppDir/usr/lib/qt6/plugins/

    - name: Create AppRun
      run: |
        printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=$(dirname "$SELF")\nexport QT_PLUGIN_PATH="$HERE/usr/lib/qt6/plugins"\nexport LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"\nexport QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/usr/lib/qt6/plugins/platforms"\nexec "$HERE/usr/bin/melonDS" "$@"\n' > AppDir/AppRun
        chmod +x AppDir/AppRun

    - name: Copy desktop file and icon
      run: |
        cp AppDir/usr/share/applications/net.kuribo64.melonDS.desktop AppDir/
        cp AppDir/usr/share/icons/hicolor/256x256/apps/net.kuribo64.melonDS.png AppDir/

    - name: Fetch appimagetool
      run: |
        wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
        chmod +x appimagetool

    - name: Build AppImage
      run: ./appimagetool AppDir melonDS-x86_64.AppImage

    - uses: actions/upload-artifact@v4
      with:
        name: melonDS-appimage-x86_64
        path: melonDS*.AppImage
