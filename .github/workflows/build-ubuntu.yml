name: Ubuntu

on:
  push:
    branches:
      - master
      - ui
      - ci/*
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions
#  MELONDS_VERSION_SUFFIX: " RC"

jobs:
  build:
    continue-on-error: true
    name: x86_64
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      name: Check out sources

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install --allow-downgrades cmake ninja-build extra-cmake-modules \
          libpcap0.8-dev libsdl2-dev libenet-dev libarchive-dev libzstd-dev \
          libfaad-dev libfuse2 libwayland-dev wayland-protocols \
          libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-dev \
          libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
          libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
          libxcb-xinerama0-dev libxcb-xfixes0-dev qt6-wayland

    - name: Install Qt 6.10.2
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.2'
        host: linux
        target: desktop
        arch: linux_gcc_64
        modules: 'qtmultimedia'
        cache: true

    - name: Configure
      run: cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DMELONDS_EMBED_BUILD_INFO=ON

    - name: Build
      run: |
        cmake --build build
        DESTDIR=AppDir cmake --install build

    - uses: actions/upload-artifact@v4
      with:
        name: melonDS-ubuntu-x86_64
        path: AppDir/usr/bin/melonDS

    - name: Bundle libraries and plugins
      run: |
        set -e
        QMAKE=$(find /home/runner/work -name 'qmake6' 2>/dev/null | head -1)
        QT_INSTALL_LIBS=$(${QMAKE} -query QT_INSTALL_LIBS)
        QT_INSTALL_PLUGINS=$(${QMAKE} -query QT_INSTALL_PLUGINS)

        mkdir -p AppDir/usr/lib AppDir/usr/lib/qt6/plugins

        # Qt libraries
        for lib in Core Gui Widgets Network Multimedia OpenGL OpenGLWidgets Svg DBus WaylandClient XcbQpa; do
          cp -a $QT_INSTALL_LIBS/libQt6${lib}.so* AppDir/usr/lib/ 2>/dev/null || true
        done

        # ICU (bundled with Qt installer)
        cp -a $QT_INSTALL_LIBS/libicui18n.so* AppDir/usr/lib/ 2>/dev/null || true
        cp -a $QT_INSTALL_LIBS/libicuuc.so*   AppDir/usr/lib/ 2>/dev/null || true
        cp -a $QT_INSTALL_LIBS/libicudata.so* AppDir/usr/lib/ 2>/dev/null || true

        # System libs missing from workflow vs manual build
        cp -a /usr/lib/x86_64-linux-gnu/libSDL2-2.0.so* AppDir/usr/lib/ 2>/dev/null || true
        cp -a /usr/lib/x86_64-linux-gnu/libarchive.so*  AppDir/usr/lib/ 2>/dev/null || true
        cp -a /usr/lib/x86_64-linux-gnu/libzstd.so*     AppDir/usr/lib/ 2>/dev/null || true
        cp -a /usr/lib/x86_64-linux-gnu/libfaad.so*     AppDir/usr/lib/ 2>/dev/null || true

        # Qt plugins
        for plugin in platforms imageformats multimedia xcbglintegrations \
                      wayland-graphics-integration-client wayland-decoration-client \
                      wayland-shell-integration styles platformthemes; do
          cp -a $QT_INSTALL_PLUGINS/$plugin AppDir/usr/lib/qt6/plugins/ 2>/dev/null || true
        done

        # Wayland platform plugins from system qt6-wayland
        find /usr/lib -name 'libqwayland-egl.so' -o -name 'libqwayland-generic.so' 2>/dev/null | \
          xargs -I{} cp {} AppDir/usr/lib/qt6/plugins/platforms/ 2>/dev/null || true

    - name: Create AppRun
      run: |
        printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=$(dirname "$SELF")\nexport QT_PLUGIN_PATH="$HERE/usr/lib/qt6/plugins"\nexport LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"\nexec "$HERE/usr/bin/melonDS" "$@"\n' > AppDir/AppRun
        chmod +x AppDir/AppRun

    - name: Copy desktop file and icon
      run: |
        cp AppDir/usr/share/applications/net.kuribo64.melonDS.desktop AppDir/
        cp AppDir/usr/share/icons/hicolor/256x256/apps/net.kuribo64.melonDS.png AppDir/

    - name: Fetch appimagetool
      run: |
        wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
        chmod +x appimagetool

    - name: Build AppImage
      run: ./appimagetool AppDir melonDS-x86_64.AppImage

    - uses: actions/upload-artifact@v4
      with:
        name: melonDS-appimage-x86_64
        path: melonDS*.AppImage
